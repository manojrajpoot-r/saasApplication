<!-- src/app/shared/components/base-table/base-table.component.html -->

<p-table
    #dt
    [value]="data"
    [columns]="columns"
    [loading]="loading"
    [paginator]="true"
    [rows]="rows"
    [totalRecords]="totalRecords"
    [lazy]="true"
    [rowsPerPageOptions]="rowsPerPageOptions"
    [tableStyle]="{ 'min-width': '75rem' }"
    [rowHover]="true"
    [dataKey]="dataKey"
    [(selection)]="selection"
    (selectionChange)="selectionChange.emit($event)"
    (onPage)="pageChange.emit($event)"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} records"
    [showCurrentPageReport]="true"
>

    <!-- Caption -->

    <ng-template pTemplate="caption">

        <div class="flex items-center justify-between">

            <div class="font-semibold text-xl">
                Records
            </div>

            <div class="flex gap-2">

                <p-iconfield>

                    <p-inputicon styleClass="pi pi-search" />

                    <input
                        pInputText
                        type="text"
                        [value]="globalSearch"
                        (input)="onSearch($event)"
                        placeholder="Search..." />

                </p-iconfield>

                <p-button
                    label="Export"
                    icon="pi pi-upload"
                    severity="secondary"
                    (onClick)="exportCSV()">
                </p-button>

            </div>

        </div>

    </ng-template>


    <!-- Header -->

    <ng-template pTemplate="header">

        <tr>

            <th style="width:3rem">

                <p-tableHeaderCheckbox />

            </th>

            <th
                *ngFor="let col of columns"
                [pSortableColumn]="col.sortable ? col.field : ''">

                {{ col.header }}

                <p-sortIcon
                    *ngIf="col.sortable"
                    [field]="col.field">
                </p-sortIcon>

            </th>

            <th
                *ngIf="actions.length"
                style="min-width:12rem">

                Actions

            </th>

        </tr>

    </ng-template>


    <!-- Body -->

    <ng-template
        pTemplate="body"
        let-row>

        <tr>

            <td>

                <p-tableCheckbox
                    [value]="row">
                </p-tableCheckbox>

            </td>


            <td
                *ngFor="let col of columns">

                <ng-container
                    [ngSwitch]="col.type">

                    <!-- Status Tag -->

                    <p-tag
                        *ngSwitchCase="'tag'"
                        [value]="row[col.field]
                            ? 'Active'
                            : 'Inactive'"
                        [severity]="row[col.field]
                            ? 'success'
                            : 'danger'">

                    </p-tag>

                    <!-- Normal Text -->

                    <span *ngSwitchDefault>

                        {{ row[col.field] }}

                    </span>

                </ng-container>

            </td>


            <!-- Actions -->

            <td *ngIf="actions.length">

                <div class="flex gap-2">

                    <p-button
                        *ngFor="let action of actions"
                        [icon]="action.icon"
                        [severity]="action.severity"
                        (onClick)="onAction(
                            action.action,
                            row
                        )">

                    </p-button>

                </div>

            </td>

        </tr>

    </ng-template>


    <!-- Empty -->

    <ng-template pTemplate="emptymessage">

        <tr>

            <td
                [attr.colspan]="
                    columns.length + 2
                "
                class="text-center py-4">

                No records found.

            </td>

        </tr>

    </ng-template>

</p-table>
