        <p-toolbar styleClass="mb-6">
            <ng-template #start>
                <p-button label="New" icon="pi pi-plus" severity="secondary" class="mr-2" (onClick)="openNew()" />
                <p-button severity="secondary" label="Delete" icon="pi pi-trash" outlined (onClick)="handleDeleteselected()" [disabled]="!selectedCheckBox || !selectedCheckBox.length" />
            </ng-template>


        </p-toolbar>




        <app-base-table
            [data]="subcategories()"
            [columns]="columns"
            [actions]="actions"
            [selection]="selectedCheckBox ?? []"
            (selectionChange)="selectedCheckBox = $event"
            (search)="search.set($event)"
            (actionClick)="handleAction($event)">
        </app-base-table>


        <p-dialog
            [(visible)]="handleDialog"
            [style]="{ width: '450px' }"
            header={{header}}
            [modal]="true">

                <form [formGroup]="handleForm" (ngSubmit)="handleSubmit()">

                    <!-- BODY -->

                    <div class="flex flex-col gap-6">
                        <div>
                            <label class="block font-bold mb-3">
                                Category
                            </label>

                          <p-select
                                [options]="categories()"
                                optionLabel="name"
                                optionValue="id"
                                formControlName="categoryId">
                                </p-select>
                        </div>
                                <div>
                                    <label class="block font-bold mb-3">
                                    Category Name
                                    </label>
                                        <input pInputText
                                        formControlName="name"
                                        class="w-full"
                                        [appFieldError]="handleForm.controls.name"
                                        fieldName="Name" />
                                </div>

                                <div>
                                    <label class="block font-bold mb-3">
                                    Description
                                    </label>
                                        <input pInputText
                                        formControlName="description"
                                        class="w-full"
                                        [appFieldError]="handleForm.controls.description"
                                        fieldName="Description" />
                                </div>

                             <div>
                                <label class="block font-bold mb-3">
                                    Image
                                </label>

                                <input
                                  *ngIf="imagePreview"
                                    [src]="imagePreview"
                                    width="100"
                                    height="100"
                                    type="file"
                                    class="w-full"
                                    (change)="onFileSelected($event)">
                            </div>

                    </div>

                    <!-- FOOTER -->

                    <div class="flex justify-end gap-2 mt-5">

                        <p-button
                            label="Cancel"
                            icon="pi pi-times"
                            severity="secondary"
                            type="button"
                            (click)="hideDialog()">
                        </p-button>

                        <p-button
                            [label]="selectedId ? 'Update' : 'Save'"
                            icon="pi pi-check"
                            type="submit">
                        </p-button>

                    </div>

                </form>

        </p-dialog>

        <p-confirmdialog [style]="{ width: '450px' }" />
