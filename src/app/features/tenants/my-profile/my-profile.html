<div class="grid">

    <!-- Profile Card -->
    <div class="col-12 lg:col-4">
        <p-card>

            <div class="flex flex-column align-items-center">

                <p-avatar
                    image="assets/images/user.png"
                    shape="circle"
                    size="xlarge">
                </p-avatar>

                <h2 class="mt-3 mb-1">{{ users()[0]?.fullName }}</h2>

                <p-tag
                    severity="success"
                    value="Tenant Admin">
                </p-tag>

                <p class="text-500 mt-3">
                    {{ users()[0]?.email }}
                </p>

                <p class="text-500">
                    +91 9876543210
                </p>

                <div class="flex gap-2 mt-4">
                <button
                    pButton
                    label="Edit Profile"
                    icon="pi pi-user-edit"
                    (click)="handleEdit(users()[0])">
                </button>

               <button
                    pButton
                    label="Password"
                    icon="pi pi-lock"
                    severity="secondary"
                    (click)="openPasswordDialog()">
                </button>
                </div>

            </div>

        </p-card>
    </div>
      <p-dialog
            [(visible)]="handleDialog"
            [style]="{ width: '450px' }"
            [header]="header"
            [modal]="true"
            (onHide)="hideDialog()">

            <form [formGroup]="handleForm" (ngSubmit)="handleSubmit()">

                <div class="mb-3">
                    <label class="block font-bold mb-2">Full Name</label>
                    <input pInputText formControlName="fullName" class="w-full">
                </div>

                <div class="mb-3">
                    <label class="block font-bold mb-2">Email</label>
                    <input pInputText formControlName="email" class="w-full">
                </div>

            </form>

            <ng-template pTemplate="footer">

                <button
                    pButton
                    label="Cancel"
                    severity="secondary"
                    (click)="hideDialog()">
                </button>

                <button
                    pButton
                    label="Save"
                    (click)="handleSubmit()">
                </button>

            </ng-template>

        </p-dialog>

    <p-dialog
        header="Change Password"
        [(visible)]="passwordDialog"
        [modal]="true"
        [style]="{width:'450px'}">

        <form [formGroup]="passwordForm">

            <div class="field mb-3">
                <label>Current Password</label>
                <input
                    pInputText
                    type="password"
                    formControlName="currentPassword"
                    class="w-full">
            </div>

            <div class="field mb-3">
                <label>New Password</label>
                <input
                    pInputText
                    type="password"
                    formControlName="newPassword"
                    class="w-full">
            </div>

            <div class="field mb-3">
                <label>Confirm Password</label>
                <input
                    pInputText
                    type="password"
                    formControlName="confirmPassword"
                    class="w-full">
            </div>

        </form>

        <ng-template pTemplate="footer">

            <button
                pButton
                label="Cancel"
                severity="secondary"
                (click)="passwordDialog=false">
            </button>

            <button
                pButton
                label="Update Password"
                (click)="submitPassword()">
            </button>

        </ng-template>


    </p-dialog>  
    <!-- User Details -->
    <div class="col-12 lg:col-8">

        <p-card header="Profile Information">

            <div class="grid">

                <div class="col-12 md:col-6">
                    <label class="font-bold">Full Name</label>
                    <p>{{ users()[0]?.fullName }}</p>
                </div>

                <div class="col-12 md:col-6">
                    <label class="font-bold">Email</label>
                    <p>{{ users()[0]?.email }}</p>
                </div>

                <!-- <div class="col-12 md:col-6">
                    <label class="font-bold">Phone</label>
                    <p>{{ users()[0]?.phone }}</p>
                </div>

                <div class="col-12 md:col-6">
                    <label class="font-bold">Role</label>
                    <p>{{ users()[0]?.role }}</p>
                </div>

                <div class="col-12 md:col-6">
                    <label class="font-bold">Tenant Name</label>
                    <p>{{ users()[0]?.tenantName }}</p>
                </div> -->

                <div class="col-12 md:col-6">
                    <label class="font-bold">Status</label>
                    <p-tag
                        severity="success"
                        value="Active">
                    </p-tag>
                </div>

            </div>

        </p-card>

    </div>

    <!-- Subscription Card -->
    <div class="col-12 lg:col-6">

        <p-card>

            <div class="flex justify-content-between align-items-center">

                <div>
                    <h3>Current Subscription</h3>
                    <h2 class="text-primary">
                        Premium Plan
                    </h2>
                </div>

                <i
                    class="pi pi-crown text-yellow-500"
                    style="font-size:3rem">
                </i>

            </div>

            <p-divider></p-divider>

            <div class="grid">

                <div class="col-6">
                    <label class="font-bold">
                        Start Date
                    </label>
                    <p>01-Jun-2026</p>
                </div>

                <div class="col-6">
                    <label class="font-bold">
                        Expiry Date
                    </label>
                    <p>01-Jul-2026</p>
                </div>

                <div class="col-12">
                    <label class="font-bold">
                        Days Remaining
                    </label>
                    <p>10 Days</p>
                </div>

            </div>

        </p-card>

    </div>

    <!-- Statistics Card -->
    <div class="col-12 lg:col-6">

        <p-card>

            <h3>Account Statistics</h3>

            <div class="grid mt-3">

                <div class="col-6">
                    <div class="surface-card border-round p-3 text-center">
                        <i class="pi pi-wallet text-primary text-2xl"></i>
                        <h2>₹12,500</h2>
                        <span>Total Payments</span>
                    </div>
                </div>

                <div class="col-6">
                    <div class="surface-card border-round p-3 text-center">
                        <i class="pi pi-credit-card text-green-500 text-2xl"></i>
                        <h2>8</h2>
                        <span>Transactions</span>
                    </div>
                </div>

                <div class="col-6 mt-3">
                    <div class="surface-card border-round p-3 text-center">
                        <i class="pi pi-users text-blue-500 text-2xl"></i>
                        <h2>25</h2>
                        <span>Users</span>
                    </div>
                </div>

                <div class="col-6 mt-3">
                    <div class="surface-card border-round p-3 text-center">
                        <i class="pi pi-calendar text-orange-500 text-2xl"></i>
                        <h2>365</h2>
                        <span>Days Active</span>
                    </div>
                </div>

            </div>

        </p-card>

    </div>

</div>
