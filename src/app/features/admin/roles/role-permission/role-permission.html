<div class="card">

    <div class="flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="m-0">
                Role Permission Management
            </h2>

            <p class="text-color-secondary mt-2">
                Manage permissions for selected role
            </p>
        </div>

        <p-tag
            [value]="roleName"
            severity="info">
        </p-tag>

    </div>

    @if (loading) {

        <div class="flex justify-content-center py-8">

            <p-progressSpinner />

        </div>

    }

    @if (!loading && permissions.length > 0) {

        @for (group of permissions; track group.groupName) {

            <p-panel
                [header]="group.groupName"
                class="mb-4">

                <div class="flex justify-content-end mb-3">

                    <p-checkbox
                        [binary]="true"
                        [ngModel]="isAllSelected(group.items)"
                        (onChange)="toggleGroup(group.items, $event)">
                    </p-checkbox>

                    <label class="ml-2">
                        Select All
                    </label>

                </div>

                <div class="grid">

                    @for (item of group.items; track item.id) {

                        <div class="col-12 md:col-6 lg:col-4">

                            <div
                                class="border-1 surface-border border-round p-3">

                                <p-checkbox
                                    [(ngModel)]="item.checked"
                                    [binary]="true"
                                    [inputId]="'permission_' + item.id">
                                </p-checkbox>

                                <label
                                    class="ml-2 cursor-pointer"
                                    [for]="'permission_' + item.id">

                                    {{ item.name }}

                                </label>

                            </div>

                        </div>

                    }

                </div>

            </p-panel>

        }

        <div class="flex justify-content-end mt-4">

            <p-button
                label="Save Permissions"
                icon="pi pi-check"
                severity="success"
                (onClick)="savePermissions()">
            </p-button>

        </div>

    }

    @if (!loading && permissions.length === 0) {

        <div class="text-center py-8">

            <i
                class="pi pi-info-circle text-4xl text-color-secondary">
            </i>

            <p class="mt-3">
                No Permissions Found
            </p>

        </div>

    }

</div>
