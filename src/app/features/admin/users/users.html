 <p-toolbar styleClass="mb-6">
            <ng-template #start>
                <p-button label="New" icon="pi pi-plus" severity="secondary" class="mr-2" (onClick)="openNew()" />
                <p-button severity="secondary" label="Delete" icon="pi pi-trash" outlined (onClick)="deleteSelectedUsers()" [disabled]="!selectedUsers || !selectedUsers.length" />
            </ng-template>

            <ng-template #end>
                <p-button label="Export" icon="pi pi-upload" severity="secondary" (onClick)="exportCSV()" />
            </ng-template>
        </p-toolbar>

        <p-table
            #dt
            [value]="users()"
            [rows]="10"
            [columns]="cols"
            [paginator]="true"
            [globalFilterFields]="['name', 'country.name', 'representative.name', 'status']"
            [tableStyle]="{ 'min-width': '75rem' }"
            [(selection)]="selectedUsers"
            [rowHover]="true"
            dataKey="id"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} users"
            [showCurrentPageReport]="true"
            [rowsPerPageOptions]="[10, 20, 30]"
        >
            <ng-template #caption>
                <div class="flex items-center justify-between">
                    <h5 class="m-0">Manage Users</h5>
                    <p-iconfield>
                        <p-inputicon styleClass="pi pi-search" />
                        <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Search..." />
                    </p-iconfield>
                </div>
            </ng-template>
            <ng-template #header>
                <tr>
                    <th style="width: 3rem">
                        <p-tableHeaderCheckbox />
                    </th>
             
                    <th pSortableColumn="name" style="min-width:16rem">
                        Name
                        <p-sortIcon field="name" />
                    </th>
                
                    <th pSortableColumn="email" style="min-width: 8rem">
                        Email
                        <p-sortIcon field="email" />
                    </th>
                
                
                    <th pSortableColumn="status" style="min-width: 12rem">
                        Status
                        <p-sortIcon field="status" />
                    </th>
                    <th style="min-width: 12rem"></th>
                </tr>
            </ng-template>
          <ng-template #body let-user>
    <tr>
        <td>
            <p-tableCheckbox [value]="user" />
        </td>

        <td>{{ user.fullName }}</td>
        <td>{{ user.email }}</td>

        <td>
            <p-button
                icon="pi pi-pencil"
                [rounded]="true"
                [outlined]="true"
                (click)="editUser(user)">
            </p-button>

            <p-button
                icon="pi pi-trash"
                severity="danger"
                [rounded]="true"
                [outlined]="true"
                (click)="deleteUser(user)">
            </p-button>
        </td>
    </tr>
</ng-template>
        </p-table>

        <p-dialog [(visible)]="userDialog" [style]="{ width: '450px' }" header="User Details" [modal]="true">
                     
        <form [formGroup]="userForm">
            <ng-template #content>
                <div class="flex flex-col gap-6">
                        <div>
                            <label for="name" class="block font-bold mb-3">Name</label>
                            <input type="text" pInputText id="name" formControlName="fullName"  autofocus fluid />
                        </div>
                        <div>
                            <label for="email" class="block font-bold mb-3">Email</label>
                            <input type="email" pInputText id="email" formControlName="email"  autofocus fluid />
                        </div>

                        <div>
                            <label for="inventoryStatus" class="block font-bold mb-3">Password</label>
                            <input type="password" pInputText id="inventoryStatus" formControlName="password"  autofocus fluid />
                        </div>
                </div>
            </ng-template>

                <ng-template #footer>
                    <p-button label="Cancel" icon="pi pi-times" text (click)="hideDialog()" />
                    <p-button label="Save" icon="pi pi-check" (click)="onUserSubmit()" />
                </ng-template>
        
        </form>
            </p-dialog>
       
        <p-confirmdialog [style]="{ width: '450px' }" />
